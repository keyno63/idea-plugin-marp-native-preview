name: Release Plugin

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read plugin version from gradle.properties
        id: version
        shell: bash
        run: |
          VERSION="$(grep -E '^\s*pluginVersion\s*=' gradle.properties | head -n1 | cut -d'=' -f2- | xargs)"
          if [[ -z "$VERSION" ]]; then
            echo "pluginVersion not found in gradle.properties"
            exit 1
          fi
          echo "plugin_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved plugin version: $VERSION"

      - name: Check tag does not already exist
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.plugin_version }}
        run: |
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists locally: $TAG"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists on remote: $TAG"
            exit 1
          fi

      - name: Create and push git tag
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.plugin_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"

      - name: Build plugin zip
        run: ./gradlew --no-daemon clean buildPlugin

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.plugin_version }}
          name: ${{ steps.version.outputs.plugin_version }}
          files: build/distributions/*.zip
          generate_release_notes: true
